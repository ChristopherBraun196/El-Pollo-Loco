<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>El Pollo Loco</title>
    <link
      rel="icon"
      href="./assets/img/svg/favicon_elpolloloco.png"
      type="image/png"
    />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body
    onload="
      init();
      rotateScreen();
    "
  >
    <h1>El Pollo Loco</h1>

    <div id="fullscreen">
      <div id="rotate-overlay">
        <div id="lottie-rotate"></div>
        <p>Bitte drehe dein Gerät</p>
      </div>

      <div id="modiBar">
        <button id="muteButton" onclick="toggleSound()" tabindex="-1">
          <img
            id="muteIcon"
            src="./assets/img/svg/no_sound.svg"
            alt="Mute-Button"
          />
          <span id="muteText">SOUND OFF</span>
        </button>
      </div>

      <canvas id="canvas" width="720" height="480" tabindex="0"></canvas>

      <div id="touch-controls">
        <div id="touch-controls-left">
          <button>&#8592;</button>
          <button>&#8594;</button>
        </div>
        <div id="touch-controls-right">
          <button>Jump</button>
          <button>Attack</button>
        </div>
      </div>

      <div id="game-screens">
        <img
          id="start-screen"
          src="./assets/img/screens/startscreen_1.png"
          alt="Startscreen"
        />
        <button id="startButton" onclick="startGame()">
          <img src="./assets/img/svg/play_circle.svg" alt="Start" />
        </button>
        <img
          id="screen-game-over"
          src="assets/img/screens/Game Over.png"
          style="display: none"
        />
        <img
          id="screen-you-win"
          src="assets/img/screens/You Win A.png"
          style="display: none"
        />
        <button id="homeButton" onclick="goHome()">
          <img src="./assets/img/svg/home.svg" alt="home" />Home
        </button>
        <button id="restartButton" onclick="restartGame()">
          <img src="./assets/img/svg/replay.svg" alt="restartGame" />Restart
        </button>
      </div>
    </div>

    <section>
      <div class="controls">
        <div class="controls-group">
          <h3>Movement</h3>
          <ul>
            <li><span class="key"> &#8592; / A </span> Left</li>
            <li><span class="key"> &#8594; / D</span> Right</li>
          </ul>
        </div>

        <div class="controls-group">
          <h3>Action</h3>
          <ul>
            <li><span class="key">SPACE</span> Jump</li>
            <li><span class="key">E</span> Attack</li>
          </ul>
        </div>
      </div>
    </section>
    <footer>
      <nav>
        <button onclick="openImpress()">Impressum</button>
      </nav>
      <p>Created by Christopher Braun 2026</p>
    </footer>

    <dialog id="impressum"></dialog>
    <script src="./js/lottie.min.js"></script>
    <script src="./script.js"></script>
    <script src="./models/drawable-object.class.js"></script>
    <script src="./models/moveable-object.class.js"></script>
    <script src="./models/throwable-object.class.js"></script>
    <script src="./models/character.class.js"></script>
    <script src="./models/small-chicken.class.js"></script>
    <script src="./models/chicken.class.js"></script>
    <script src="./models/cloud.class.js"></script>
    <script src="./models/coins.class.js"></script>
    <script src="./models/bottle.class.js"></script>
    <script src="./models/background-object.class.js"></script>
    <script src="./models/finalboss.class.js"></script>
    <script src="./models/level.class.js"></script>
    <script src="./models/status-bar.class.js"></script>
    <script src="./models/world.class.js"></script>
    <script src="./models/keyboard.class.js"></script>
    <script src="./levels/level1.js"></script>
    <script src="./js/game.js"></script>
  </body>
</html>
